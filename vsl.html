<!-- ── UTM → Green checkout passthrough ─────────────────────────── -->
<script>
(function () {
  var UTM_KEYS = ['utm_source','utm_medium','utm_campaign','utm_term','utm_content','src','sck'];
  function getUtmString() {
    var p = new URLSearchParams(window.location.search);
    var parts = [];
    UTM_KEYS.forEach(function(k) {
      var v = p.get(k);
      if (v) parts.push(k + '=' + encodeURIComponent(v));
    });
    return parts.join('&');
  }
  function appendUtms(href) {
    if (!href || href.startsWith('javascript') || href.startsWith('#')) return href;
    var utms = getUtmString();
    if (!utms) return href;
    var sep = href.indexOf('?') === -1 ? '?' : '&';
    return href + sep + utms;
  }
  function patchLinks() {
    document.querySelectorAll('a[href]').forEach(function(a) {
      var h = a.getAttribute('href');
      if (h && (h.includes('greenn') || h.includes('pay.') || h.includes('checkout') || h.includes('hotmart') || h.includes('eduzz') || h.includes('kiwify') || h.includes('perfectpay'))) {
        a.setAttribute('href', appendUtms(h));
      }
    });
  }
  var observer = new MutationObserver(function() { patchLinks(); });
  observer.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['href'] });
  document.addEventListener('click', function(e) {
    var a = e.target.closest('a[href]');
    if (!a) return;
    var h = a.getAttribute('href');
    if (h && (h.includes('greenn') || h.includes('pay.') || h.includes('checkout') || h.includes('hotmart') || h.includes('eduzz') || h.includes('kiwify') || h.includes('perfectpay'))) {
      var patched = appendUtms(h);
      if (patched !== h) {
        e.preventDefault();
        window.open(patched, a.target || '_self');
      }
    }
  }, true);
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', patchLinks);
  } else {
    patchLinks();
  }
})();
</script>
